<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Card</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="card">
            <div class="teal"></div>
            <div class="card-details">
                <span>
                    <img class="user-icon" src="./images/user-circle.png" alt="img1">
                </span>
                <h2>John Doe</h2>
                <div class="box"><img class="map-icon" src="./images/map-marker.png" alt="">
                    <h4>Seattle</h4>
                </div>
                <p>Developer | Engineer | Problem Solver</p>
                <p>Master of shadows and the internet!</p>
                <div class="box edit">
                    <img class="edit-icon" src="./images/gear.png" alt="">
                    <a href="#">edit profile</a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
